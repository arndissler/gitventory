# yaml-language-server: $schema=../schemas/deployment_mappings.schema.json
# Deployment mappings — fallback for repos that cannot be auto-detected via OIDC workflow parsing.
# Prefer OIDC detection (automatic). Only add entries here for repos that use other deploy methods.
# repo field accepts the full_name slug (org/repo) — resolved to stable github:ID on ingest.

mappings:
  - repo: my-org/legacy-service
    target_type: cloud_account
    target_id: "aws:123456789012"
    deploy_method: codedeploy
    environment: prod
    notes: "Migrating to OIDC in Q3 2026"
